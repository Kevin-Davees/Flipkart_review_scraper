<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Review Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="glass-panel">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.996 22C17.5188 22 21.996 17.5228 21.996 12C21.996 6.47715 17.5188 2 11.996 2C6.47314 2 1.99597 6.47715 1.99597 12C1.99597 17.5228 6.47314 22 11.996 22Z" stroke="url(#paint0_linear)" stroke-width="2"/>
                    <path d="M7 12.5L10.5 16L17 8" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="2.00004" y1="2.00002" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3B82F6"/>
                            <stop offset="1" stop-color="#8B5CF6"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="7.00003" y1="8" x2="17" y2="16" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3B82F6"/>
                            <stop offset="1" stop-color="#8B5CF6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Scraper <span class="badge">PRO</span></h1>
            </div>
            <p class="subtitle">Flipkart Reviews Extractor</p>
        </header>

        <main>
            <div class="status-card">
                <div class="stats-header">
                    <span class="status-indicator idle" id="status-dot"></span>
                    <span id="status-text">Ready to Scrape</span>
                </div>
                <div class="counter" id="review-count">0</div>
                <div class="counter-label">Reviews Collected</div>
            </div>

            <div class="actions">
                <button id="start-btn" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Start Extraction
                </button>
                <button id="pause-btn" class="btn btn-secondary hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    Pause
                </button>
                <button id="download-btn" class="btn btn-tertiary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export JSON
                </button>
            </div>
            
            <div class="footer-actions">
                <button id="clear-btn" class="btn-text">Clear Local Data</button>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
